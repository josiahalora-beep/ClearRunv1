      - name: Write web/tests/smoke.test.tsx
        run: |
          cat > web/tests/smoke.test.tsx <<'EOF'
/** @jest-environment jsdom */
import React from 'react'
import { render } from '@testing-library/react'
import Dashboard from '../pages/dashboard'

test('dashboard renders without crashing', () => {
  const { getByText } = render(<Dashboard />)
  expect(getByText(/Owner Command Center/i)).toBeInTheDocument()
})
EOF

      - name: Write .github/workflows/smoke.yml
        run: |
          cat > .github/workflows/smoke.yml <<'EOF'
name: Smoke tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - enhancement/market-domination-implementation

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install
        run: |
          cd web
          npm ci
      - name: Run tests
        run: |
          cd web
          npm test
EOF

      - name: Write README.md update
        run: |
          cat > README.md <<'EOF'
# ClearRun

This repository contains the ClearRun demo app.

Next steps for contributors and reviewers:

- Branches: Feature work happens on enhancement/* branches. This branch is enhancement/market-domination-implementation.
- To run locally (web):
  cd web
  npm install
  cp .env.example .env.local
  # set NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY in .env.local
  npm run dev

- CI: A smoke test workflow runs on PRs and pushes to the feature branch.

- Provisioning: Provisioning automation exists in .github/workflows/provision-and-deploy.yml and provisioning scripts under /scripts. This is gated and requires SUPABASE and VERCEL tokens.
EOF

      - name: Stage, commit and push branch
        run: |
          git add -A
          git commit -m "feat(ui): add responsive nav, header, stub pages, mock lib, smoke test and CI workflow (PR-2)" || echo "No changes to commit"
          git push -u origin HEAD

      - name: Print completion
        run: |
          echo "Branch enhancement/market-domination-implementation updated with PR-2 files. Open the branch at:"
          echo "https://github.com/${{ github.repository }}/tree/enhancement/market-domination-implementation"
