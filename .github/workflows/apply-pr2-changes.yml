name: Apply PR-2 changes (safe github-script)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-pr2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create branch and write placeholder files via GitHub API
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'enhancement/market-domination-implementation';

            // Resolve default branch SHA
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;
            const branchInfo = await github.rest.repos.getBranch({ owner, repo, branch: defaultBranch });
            const baseSha = branchInfo.data.commit.sha;

            // Create branch if missing
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: baseSha });
              console.log(`Created branch ${branch}`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`Branch ${branch} already exists`);
              } else {
                throw err;
              }
            }

            // Minimal placeholder files to avoid YAML quoting issues.
            // After this run succeeds I can push full file contents in a follow-up workflow or PR.
            const files = {
              "README.md": "# ClearRun\n\nPlaceholder commit for PR-2 automation.\n",
              "web/.gitkeep": ""
            };

            for (const [path, content] of Object.entries(files)) {
              const message = `chore(pr-2): add ${path}`;
              const encoded = Buffer.from(content, 'utf8').toString('base64');

              // Try to get existing file sha on branch
              let sha;
              try {
                const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (existing && existing.data && existing.data.sha) sha = existing.data.sha;
              } catch (err) {
                if (err.status !== 404) throw err;
                // file does not exist — will create
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                message,
                content: encoded,
                branch,
                sha
              });

              console.log(`Wrote ${path}`);
            }

            console.log(`All placeholder files written to branch ${branch}.`);
