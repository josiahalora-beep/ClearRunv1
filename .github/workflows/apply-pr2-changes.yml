name: Apply PR-2 changes (create branch & files)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-pr2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="enhancement/market-domination-implementation"
          git fetch origin
          git checkout -b "$BRANCH"

      - name: Create directories
        run: |
          mkdir -p web/components web/pages web/lib web/tests .github/workflows scripts

      - name: Write web/components/NavMobile.tsx
        run: |
          cat > web/components/NavMobile.tsx <<'EOF'
import Link from 'next/link'
import { useState } from 'react'

export default function NavMobile() {
  const [open, setOpen] = useState(false)
  return (
    <div className="md:hidden">
      <button aria-label="open menu" onClick={() => setOpen(true)} className="px-3 py-2">Menu</button>
      {open && (
        <div className="fixed inset-0 z-50 bg-black/40" onClick={() => setOpen(false)}>
          <nav className="absolute left-0 top-0 w-64 h-full bg-white p-6" onClick={(e)=>e.stopPropagation()}>
            <div className="flex items-center justify-between">
              <div className="font-semibold text-clearrun-900">ClearRun</div>
              <button onClick={()=>setOpen(false)} aria-label="close">Close</button>
            </div>
            <ul className="mt-6 space-y-3 text-sm">
              <li><Link href="/dashboard"><a>Owner Dashboard</a></Link></li>
              <li><Link href="/office"><a>Office Queues</a></Link></li>
              <li><Link href="/field"><a>Field Capture</a></Link></li>
              <li><Link href="/services"><a>Services</a></Link></li>
              <li><Link href="/requests"><a>Proof Requests</a></Link></li>
              <li><Link href="/cityview"><a>CityView</a></Link></li>
              <li><Link href="/audit"><a>Audit Log</a></Link></li>
            </ul>
          </nav>
        </div>
      )}
    </div>
  )
}
EOF

