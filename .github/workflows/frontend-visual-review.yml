name: Frontend Visual Review

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-visual-review.yml"
      - "vercel.json"
  workflow_dispatch:

jobs:
  frontend-visual-review:
    name: Frontend visual review
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    # Visual review validates the production build, screenshots, axe, and Lighthouse.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Serve production build
        run: |
          node scripts/serve-build.mjs > ../frontend-visual-server.log 2>&1 &
          echo $! > ../frontend-visual-server.pid

      - name: Wait for preview server
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4173/ > /dev/null; then
              echo "Preview server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not start"
          cat ../frontend-visual-server.log || true
          exit 1

      - name: Capture screenshots and run axe checks
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: npm run visual:screenshots

      - name: Run Lighthouse review
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: npm run lighthouse:review

      - name: Upload screenshots and axe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-review-screenshots-and-axe
          path: |
            frontend/test-results/screenshots
            frontend/test-results/axe
            frontend/test-results/playwright-report
          if-no-files-found: warn

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lighthouse-review
          path: frontend/test-results/lighthouse
          if-no-files-found: warn

      - name: Upload preview server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-server-log
          path: frontend-visual-server.log
          if-no-files-found: warn

      - name: Stop preview server
        if: always()
        run: |
          if [ -f ../frontend-visual-server.pid ]; then
            kill "$(cat ../frontend-visual-server.pid)" || true
          fi
