name: Frontend Visual Review

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-visual-review.yml"
      - "vercel.json"
  workflow_dispatch:

jobs:
  visual-review:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      REACT_APP_BACKEND_URL: http://127.0.0.1:8001
      REACT_APP_ADMIN_SESSION_TTL_HOURS: "4"
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"

      - name: Install frontend dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build production frontend
        run: npm run build

      - name: Run Playwright visual and axe review
        run: npm run review:visual

      - name: Run Lighthouse review
        run: npm run review:lighthouse

      - name: Upload visual review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-review
          path: |
            frontend/test-results/visual-review
            frontend/test-results/axe
            frontend/test-results/lighthouse
            frontend/playwright-report
