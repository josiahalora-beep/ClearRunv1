              ".github/workflows/smoke.yml": `name: Smoke tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - enhancement/market-domination-implementation

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
