name: Apply PR-2 changes (create branch & files) via github-script

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-pr2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create/Update files via GitHub API
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'enhancement/market-domination-implementation';

            // Get default branch SHA
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;
            const branchInfo = await github.rest.repos.getBranch({
              owner, repo, branch: defaultBranch
            });
            const baseSha = branchInfo.data.commit.sha;

            // Create branch if missing
            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: baseSha
              });
              console.log(`Created branch ${branch}`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`Branch ${branch} already exists`);
              } else {
                throw err;
              }
            }

            // Files to create/update
            const files = {
