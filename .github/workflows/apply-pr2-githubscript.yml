`,

              "README.md": `# ClearRun

This repository contains the ClearRun demo app.

Next steps for contributors and reviewers:

- Branches: Feature work happens on enhancement/* branches. This branch is enhancement/market-domination-implementation.
- To run locally (web):
  cd web
  npm install
  cp .env.example .env.local
  # set NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY in .env.local
  npm run dev

- CI: A smoke test workflow runs on PRs and pushes to the feature branch.

- Provisioning: Provisioning automation exists in .github/workflows/provision-and-deploy.yml and provisioning scripts under /scripts. This is gated and requires SUPABASE and VERCEL tokens.
`
            };

            // Create or update files on the branch
            for (const [path, content] of Object.entries(files)) {
              const message = `chore(pr-2): add ${path}`;
              const encoded = Buffer.from(content, 'utf8').toString('base64');

              // Check if file exists on the branch to get sha
              let sha;
              try {
                const existing = await github.rest.repos.getContent({
                  owner, repo, path, ref: branch
                });
                if (existing && existing.data && existing.data.sha) {
                  sha = existing.data.sha;
                }
              } catch (err) {
                if (err.status !== 404) throw err;
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                message,
                content: encoded,
                branch,
                sha
              });

              console.log(`Wrote ${path}`);
            }

            console.log(`All files written to branch ${branch}.`);
