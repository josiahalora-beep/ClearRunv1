name: Apply PR-2 changes (create branch & files) via github-script

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-pr2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create/Update files via GitHub API
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'enhancement/market-domination-implementation';

            // Resolve default branch SHA
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;
            const branchInfo = await github.rest.repos.getBranch({ owner, repo, branch: defaultBranch });
            const baseSha = branchInfo.data.commit.sha;

            // Create branch if missing
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: baseSha });
              console.log(`Created branch ${branch}`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`Branch ${branch} already exists`);
              } else {
                throw err;
              }
            }

            // Files to create/update (short placeholders to avoid YAML quoting issues).
            // If you want the full file contents, we can expand these after this run succeeds.
            const files = {
              "web/components/NavMobile.tsx": "import Link from 'next/link'\\nimport { useState } from 'react'\\n\\nexport default function NavMobile() { return null }\\n",
              "web/components/NavRail.tsx": "import Link from 'next/link'\\nexport default function NavRail(){ return null }\\n",
              "web/components/Header.tsx": "export default function Header(){ return null }\\n",
              "web/lib/mock.ts": "// small mock provider for pages\\nexport const mockOrgs = [{ id: 'org-hauler-1', name: 'ClearRun Hauling Co' }]\\n",
              "web/pages/office.tsx": "export default function Office(){ return null }\\n",
              "web/pages/field.tsx": "export default function Field(){ return null }\\n",
              "web/pages/services.tsx": "export default function Services(){ return null }\\n",
              "web/pages/requests.tsx": "export default function Requests(){ return null }\\n",
              "web/pages/cityview.tsx": "export default function CityView(){ return null }\\n",
              "web/pages/audit.tsx": "export default function Audit(){ return null }\\n",
              "web/pages/intelligence.tsx": "export default function Intelligence(){ return null }\\n",
              "web/pages/settings.tsx": "export default function Settings(){ return null }\\n",
              "web/package.json": JSON.stringify({
                name: "clearrun-web",
                version: "0.1.0",
                private: true
              }, null, 2) + "\n",
              "web/jest.config.js": "module.exports = { testEnvironment: 'jsdom' };\n",
              "web/tests/smoke.test.tsx": "/** @jest-environment jsdom */\\n// smoke test placeholder\\n",
              ".github/workflows/smoke.yml": "name: Smoke tests\\n\\non: [push]\\n\\njobs:\\n  smoke:\\n    runs-on: ubuntu-latest\\n    steps:\\n      - uses: actions/checkout@v4\\n",
              "README.md": "# ClearRun\\n\\nThis repository contains the ClearRun demo app.\\n"
            };

            for (const [path, content] of Object.entries(files)) {
              const message = `chore(pr-2): add ${path}`;
              const b64 = Buffer.from(content, 'utf8').toString('base64');

              // Try to get existing file sha on branch (if any)
              let sha;
              try {
                const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (existing && existing.data && existing.data.sha) {
                  sha = existing.data.sha;
                }
              } catch (err) {
                if (err.status !== 404) throw err;
                // file does not exist — will create
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                message,
                content: b64,
                branch,
                sha
              });

              console.log(`Wrote ${path}`);
            }

            console.log(`All placeholder files written to branch ${branch}.`);
