name: Frontend Build

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
  workflow_dispatch:

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      REACT_APP_BACKEND_URL: http://127.0.0.1:8001
      REACT_APP_ADMIN_SESSION_TTL_HOURS: "4"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
